  # ─── Cancellation & Refund Engine ───

  /api/v1/bookings/{id}/cancel-preview:
    get:
      tags: [Cancellations]
      summary: Preview booking cancellation (dry-run)
      description: |
        Returns the refund calculation for a potential cancellation.
        Uses the paramétrable refund policy engine to determine:
        - Whether cancellation is allowed
        - Refund amount
        - Cancellation fees
        - Driver compensation
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Cancellation preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelPreview'
        '404':
          description: Booking not found

  /api/v1/bookings/{id}/cancel:
    post:
      tags: [Cancellations]
      summary: Cancel a booking with refund workflow
      description: |
        Executes the full cancellation workflow:
        1. Validates actor role and permissions
        2. Resolves applicable refund policy
        3. Validates cancellation and refund request windows
        4. Computes refund amounts
        5. Executes Stripe refund if applicable
        6. Writes append-only ledger corrections
        7. Updates booking status
        8. Creates cancellation_request record
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for cancellation
      responses:
        '200':
          description: Cancellation executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResult'
        '400':
          description: Business rule violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                already_cancelled:
                  value:
                    code: ALREADY_CANCELLED
                    message: This item has already been cancelled
                not_allowed:
                  value:
                    code: CANCELLATION_NOT_ALLOWED
                    message: Cancellation is not allowed in current status
                window_expired:
                  value:
                    code: REFUND_REQUEST_WINDOW_EXPIRED
                    message: The refund request deadline has passed
                invalid_policy:
                  value:
                    code: INVALID_REFUND_POLICY
                    message: No applicable refund policy found

  /api/v1/deliveries/{id}/cancel-preview:
    get:
      tags: [Cancellations]
      summary: Preview delivery cancellation (dry-run)
      description: |
        Returns the refund calculation for a potential delivery cancellation.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Cancellation preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelPreview'
        '404':
          description: Delivery not found

  /api/v1/deliveries/{id}/cancel:
    post:
      tags: [Cancellations]
      summary: Cancel a delivery with refund workflow
      description: |
        Executes the full delivery cancellation workflow with Stripe refund and ledger correction.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Cancellation executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResult'
        '400':
          description: Business rule violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

