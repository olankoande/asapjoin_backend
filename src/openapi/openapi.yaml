  # ─── Admin Refund Override ───

  /api/v1/admin/refunds/override:
    post:
      tags: [Refund Policies]
      summary: Admin override refund
      description: |
        Admin can force a refund on any booking or delivery, bypassing the standard policy.
        Creates Stripe refund, ledger corrections, and cancellation_request record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resource_type, resource_id, refund_amount_cents]
              properties:
                resource_type:
                  type: string
                  enum: [booking, delivery]
                resource_id:
                  type: string
                refund_amount_cents:
                  type: integer
                  description: Amount to refund in cents
                reason:
                  type: string
                override_policy:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Override refund executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResult'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                no_payment:
                  value:
                    code: NO_PAYMENT_FOUND
                    message: No succeeded payment found for this resource
                already_refunded:
                  value:
                    code: REFUND_ALREADY_PROCESSED
                    message: This resource has already been fully refunded

  # ─── Admin Cancellation Requests ───

  /api/v1/admin/cancellation-requests:
